<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghar Ka Swad | Authentic Culinary Heritage</title>
    <meta name="description" content="Experience the soulful flavors of Muzaffarnagar. Tradition, heritage, and pure desi ghee in every dish." />
    <link rel="icon" type="image/jpeg" href="/Assets/Logo.jpeg" />
    <style>
      @media (max-width: 640px) {
        #chatlayer-container {
          width: calc(100vw - 40px) !important;
          height: 60vh !important;
          right: 20px !important;
          bottom: 90px !important;
          max-width: none !important;
        }
        #chatlayer-btn {
          bottom: 20px !important;
          right: 20px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script 
      src="https://rhghorkwaedwkayjambc.supabase.co/functions/v1/widget?id=8"
    ></script>
    <script>
      (function() {
        // Only run on the homepage
        if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') return;

        function tryOpening() {
          var btn = document.getElementById('chatlayer-btn');
          if (btn) {
            btn.click();
            return true;
          }
          return false;
        }
        
        if (!tryOpening()) {
          var observer = new MutationObserver(function(mutations) {
            if (tryOpening()) {
              observer.disconnect();
            }
          });
          observer.observe(document.body, { childList: true });
          
          // Fallback
          setTimeout(function() { observer.disconnect(); }, 5000);
        }
      })();
    </script>
  </body>
</html>
